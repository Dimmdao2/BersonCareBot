<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta http-equiv="refresh" content="20" />
    <title>BersonCare — обновление</title>
    <style>
      :root {
        color-scheme: light;
        --text: #1a1a1a;
        --muted: #5c5c5c;
        --border: #e8e8e8;
        --surface: #f7f7f7;
        --accent: #0f766e;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #fff;
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      main {
        width: 100%;
        max-width: 28rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .brand {
        font-size: 0.875rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--accent);
      }
      h1 {
        margin: 0;
        font-size: 1.125rem;
        font-weight: 600;
        line-height: 1.35;
      }
      p {
        margin: 0;
        font-size: 0.9375rem;
        line-height: 1.5;
        color: var(--muted);
      }
      .card {
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        background: var(--surface);
        padding: 1rem;
      }
      .hint {
        font-size: 0.8125rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">BersonCare</div>
      <div class="card">
        <h1>Сервер обновляется</h1>
        <p>
          Сейчас идёт установка новой версии приложения. Обычно это занимает не больше минуты.
        </p>
        <p style="margin-top: 0.75rem">Пожалуйста, откройте приложение чуть позже.</p>
      </div>
      <p class="hint">Страница обновится автоматически через несколько секунд.</p>
    </main>
  </body>
</html>
