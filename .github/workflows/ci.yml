name: CI

on:
  push:
    branches: [ main ]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Устанавливаем pnpm (берёт версию из package.json)
      - uses: pnpm/action-setup@v4

      # Устанавливаем Node и включаем кэш pnpm
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      # Один скрипт = те же проверки, что и локально (lint, typecheck, test, test:webapp, webapp:typecheck, build, audit)
      - run: pnpm run ci