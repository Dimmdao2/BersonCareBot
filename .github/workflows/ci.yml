name: CI

on:
  push:
    branches: [ main ]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm lint
      - uses: ./.github/actions/cancel-on-failure

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm typecheck
      - uses: ./.github/actions/cancel-on-failure

  test-integrator:
    name: Test (integrator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm test
      - uses: ./.github/actions/cancel-on-failure

  test-webapp-core:
    name: Test (webapp core ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/cache@v4
        with:
          path: |
            apps/webapp/node_modules/.vite
            apps/webapp/node_modules/.experimental-vitest-cache
          key: vitest-webapp-${{ runner.os }}-s${{ matrix.shard }}-${{ hashFiles('pnpm-lock.yaml', 'apps/webapp/vitest.config.ts', 'apps/webapp/vitest.setup.ts', 'apps/webapp/vitest.globalSetup.ts') }}
          restore-keys: |
            vitest-webapp-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
      - run: pnpm test:webapp:fast
        env:
          VITEST_SHARD: ${{ matrix.shard }}/3
      - uses: ./.github/actions/cancel-on-failure

  test-webapp-inprocess:
    name: Test (webapp in-process ${{ matrix.shard }}/3)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/cache@v4
        with:
          path: |
            apps/webapp/node_modules/.vite
            apps/webapp/node_modules/.experimental-vitest-cache
          key: vitest-webapp-${{ runner.os }}-s${{ matrix.shard }}-${{ hashFiles('pnpm-lock.yaml', 'apps/webapp/vitest.config.ts', 'apps/webapp/vitest.setup.ts', 'apps/webapp/vitest.globalSetup.ts') }}
          restore-keys: |
            vitest-webapp-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
      - run: pnpm test:webapp:inprocess
        env:
          VITEST_SHARD: ${{ matrix.shard }}/3
      - uses: ./.github/actions/cancel-on-failure

  build-integrator:
    name: Build (integrator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm build
      - uses: ./.github/actions/cancel-on-failure

  build-webapp:
    name: Build (webapp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/cache@v4
        with:
          path: apps/webapp/.next/cache
          key: nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/webapp/src/**') }}
          restore-keys: |
            nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-
      - run: pnpm build:webapp
      - uses: ./.github/actions/cancel-on-failure

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm run audit
      - uses: ./.github/actions/cancel-on-failure

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      [
        lint,
        typecheck,
        test-integrator,
        test-webapp-core,
        test-webapp-inprocess,
        build-integrator,
        build-webapp,
        audit,
      ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      - name: Deploy to host
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "bash ${{ secrets.DEPLOY_PATH }}/deploy/host/deploy-prod.sh"
