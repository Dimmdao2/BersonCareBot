name: Host Production Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.HOST_DEPLOY_SSH_KEY }}

      - name: Deploy to host
        run: ssh -o StrictHostKeyChecking=no ${{ secrets.HOST_DEPLOY_USER }}@${{ secrets.HOST_DEPLOY_HOST }} "/opt/projects/bersoncarebot/deploy/host/deploy-prod.sh"
