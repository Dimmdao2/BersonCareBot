name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - rollback

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 30m
          debug: true
          script: |
            set -euo pipefail

            echo "=== whoami/host/time ==="
            whoami
            hostname
            date

            cd /opt/tgcarebot/app
            if [ ! -x ./deploy/deploy-bluegreen.sh ]; then
              chmod +x ./deploy/deploy-bluegreen.sh
            fi
            if [ ! -x ./deploy/rollback-bluegreen.sh ]; then
              chmod +x ./deploy/rollback-bluegreen.sh
            fi

            ACTION_INPUT="${{ github.event.inputs.action }}"
            if [ -z "${ACTION_INPUT}" ]; then
              ACTION_INPUT="deploy"
            fi
            echo "=== action: ${ACTION_INPUT} ==="
            if [ "${ACTION_INPUT}" = "rollback" ]; then
              ./deploy/rollback-bluegreen.sh
            else
              ./deploy/deploy-bluegreen.sh
            fi