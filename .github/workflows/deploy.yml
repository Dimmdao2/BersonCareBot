name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 30m
          debug: true
          script: |
            set -euo pipefail

            echo "=== whoami/host/time ==="
            whoami
            hostname
            date

            echo "=== step: stop service ==="
            sudo systemctl stop tgcarebot || true

            echo "=== step: ensure ownership ==="
            sudo chown -R tgcarebot:tgcarebot /opt/tgcarebot/app

            echo "=== step: git sync (as tgcarebot) ==="
            sudo -u tgcarebot bash -lc '
              set -e
              export GIT_TERMINAL_PROMPT=0
              cd /opt/tgcarebot/app
              git fetch --prune origin
              git checkout -B main origin/main
              git reset --hard origin/main
            '

            echo "=== step: pnpm install (as tgcarebot) ==="
            sudo -u tgcarebot bash -lc '
              cd /opt/tgcarebot/app
              CI=true pnpm install --frozen-lockfile --reporter=append-only
            '

            echo "=== step: build (as tgcarebot) ==="
            sudo -u tgcarebot bash -lc '
              cd /opt/tgcarebot/app
              pnpm build
            '

            echo "=== step: migrate (as tgcarebot) ==="
            sudo -u tgcarebot bash -lc '
              set -e
              set -a
              source /opt/tgcarebot/.env
              set +a
              cd /opt/tgcarebot/app
              pnpm exec tsx src/db/migrate.ts
            '

            echo "=== step: restart ==="
            sudo systemctl restart tgcarebot

            echo "=== step: status ==="
            sudo systemctl status tgcarebot --no-pager
