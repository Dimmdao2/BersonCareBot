name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          request_pty: true
          timeout: 120s
          command_timeout: 30m
          debug: true
          script: |
            set -euo pipefail

            echo "=== whoami/host/time ==="
            whoami
            hostname
            date

            echo "=== step: git pull ==="
            time sudo -u tgcarebot bash -lc 'cd /opt/tgcarebot/app && git status --porcelain && git pull --rebase'

            echo "=== step: pnpm install ==="
            time sudo -u tgcarebot bash -lc 'cd /opt/tgcarebot/app && pnpm install --frozen-lockfile --reporter=append-only'

            echo "=== step: pnpm build ==="
            time sudo -u tgcarebot bash -lc 'cd /opt/tgcarebot/app && pnpm build'

            echo "=== step: restart ==="
            sudo systemctl restart tgcarebot

            echo "=== step: status ==="
            sudo systemctl status tgcarebot --no-pager