name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 30m
          debug: true
          script: |
            set -euo pipefail

            echo "=== whoami/host/time ==="
            whoami
            hostname
            date

            echo "=== step: git sync ==="
            cd /opt/tgcarebot/app
            export GIT_TERMINAL_PROMPT=0
            git fetch --prune origin
            git checkout -B main origin/main
            git reset --hard origin/main

            echo "=== step: pnpm install ==="
            CI=true pnpm install --frozen-lockfile --reporter=append-only

            echo "=== step: build ==="
            pnpm build

            echo "=== step: migrate (uses /opt/tgcarebot/.env) ==="
            set -a
            source /opt/tgcarebot/.env
            set +a
            pnpm exec tsx src/persistence/migrate.ts

            echo "=== step: restart ==="
            systemctl --user restart tgcarebot || true
            sudo -n systemctl restart tgcarebot

            echo "=== step: status ==="
            sudo -n systemctl status tgcarebot --no-pager