name: Setup pnpm workspace
description: Setup Node.js, pnpm, and install workspace dependencies

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v5
    - uses: actions/setup-node@v5
      with:
        node-version: "22"
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash