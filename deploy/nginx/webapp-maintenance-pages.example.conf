# Страница «идёт обновление» только при недоступности upstream (рестарт webapp → 502/503/504).
# Подключить в server {} HTTPS для bersoncare.ru, до location /.
#
# Production host: /etc/nginx/sites-available/bersoncarebot-webapp
# Страница: /opt/projects/bersoncarebot/apps/webapp/public/maintenance.html
#
# После правки: sudo nginx -t && sudo systemctl reload nginx

error_page 502 503 504 =200 /maintenance.html;

location = /maintenance.html {
    alias /opt/projects/bersoncarebot/apps/webapp/public/maintenance.html;
    internal;
    default_type text/html;
    charset utf-8;
    add_header Cache-Control "no-store" always;
    add_header Retry-After "60" always;
}
