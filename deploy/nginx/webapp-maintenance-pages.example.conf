# Пример: страница «идёт обновление» вместо 502/503/504 и на время деплоя.
# Подключить в server {} vhost webapp (bersoncare.ru), после listen/ssl, до location /.
#
# Файл страницы в репозитории:
#   /opt/projects/bersoncarebot/apps/webapp/public/maintenance.html
#
# Опционально: флаг на время полного deploy-prod (см. deploy/host/deploy-maintenance.sh):
#   /var/lib/bersoncarebot/deploy-maintenance.on
#
# Проверка: sudo nginx -t && sudo systemctl reload nginx

# Во время CI deploy (если deploy user создаёт флаг — см. sudoers-deploy.example):
set $bersoncare_deploy_maintenance 0;
if (-f /var/lib/bersoncarebot/deploy-maintenance.on) {
    set $bersoncare_deploy_maintenance 1;
}
if ($bersoncare_deploy_maintenance = 1) {
    return 503;
}

# Когда upstream (127.0.0.1:6200) недоступен — тот же экран, не «Internal Server Error».
error_page 502 503 504 =200 /maintenance.html;

location = /maintenance.html {
    alias /opt/projects/bersoncarebot/apps/webapp/public/maintenance.html;
    internal;
    default_type text/html;
    charset utf-8;
    add_header Cache-Control "no-store" always;
    add_header Retry-After "60" always;
}
