# Пример: явно логировать $request_uri и $args (query string), чтобы видеть полный путь и параметры
# независимо от того, как собран основной combined-формат. Подключение: в http {} или server {}.
#
#   access_log /var/log/nginx/bersoncare-webapp-access.log bersoncare_webapp_detailed;
#
# Проверка на хосте: sudo nginx -t && sudo systemctl reload nginx

log_format bersoncare_webapp_detailed
  '$remote_addr - $remote_user [$time_local] '
  '"$request" $status $body_bytes_sent '
  'request_uri="$request_uri" args="$args" '
  '"$http_referer" "$http_user_agent"';
